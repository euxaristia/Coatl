name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  compiler-tests:
    name: Compiler & Binary Integrity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify toolchain
        run: |
          cargo --version
          cc --version

      - name: Build
        run: cargo build

      - name: Run tests
        run: cargo test
